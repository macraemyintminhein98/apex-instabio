<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"><h1 class="text-2xl font-bold text-center mb-6">InstaBio AI Generator</h1><input id="keywords" type="text" placeholder="e.g., travel blogger, fitness" class="w-full p-3 border border-gray-300 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"><button onclick="generateBio()" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 transition-colors">Generate Bios</button><div id="output" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded min-h-[100px] text-gray-700 whitespace-pre-line"></div><div class="mt-6 text-center"><button onclick="checkout()" class="w-full bg-green-600 text-white p-3 rounded hover:bg-green-700 transition-colors">Unlock Full Access - $9.99</button></div></div><script>async function generateBio(){const keywords=document.getElementById('keywords').value;const outputDiv=document.getElementById('output');outputDiv.innerHTML='Generating...';try{const response=await fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords})});const data=await response.json();if(response.ok){outputDiv.innerText=data.bio;}else{outputDiv.innerText=`Error: ${data.error || 'Something went wrong.'}`}}catch(error){outputDiv.innerText='Failed to connect to server.'}}function checkout(){alert('Integrating Stripe Checkout functionality...')}</script></body></html>
